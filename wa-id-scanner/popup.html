<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; margin: 12px; width: 320px; }
    h1 { font-size: 14px; margin: 0 0 10px; }
    .row { display:flex; gap:8px; }
    textarea { width: 100%; height: 90px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
    button { padding: 8px 10px; cursor: pointer; }
    .hint { font-size: 12px; color: #555; margin-top: 8px; line-height: 1.35; }
    .status { font-size: 12px; margin-top: 6px; color: #0a6; }
    .err { color:#a00; }
  </style>
</head>
<body>
  <h1>WhatsApp ID Scanner</h1>
  <div class="row">
    <button id="btnGet">Pegar ID do chat atual</button>
    <button id="btnCopy">Copiar</button>
  </div>
  <div style="margin-top:10px;">
    <textarea id="out" placeholder="Abra uma conversa no WhatsApp Web e clique em 'Pegar ID'..."></textarea>
  </div>
  <div id="status" class="status"></div>
  <div class="hint">
    Dica: o ID geralmente parece com <b>...@c.us</b> (contato) ou <b>...@g.us</b> (grupo).
  </div>
  <script src="popup.js"></script>
</body>
</html>
